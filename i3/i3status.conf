# ══════════════════════════════════════════════════════════════════════════════
# i3status — Status Bar Config (Tokyo Night)
# Gerenciado pelo dotfiles: dotfiles/i3/i3status.conf
# Lido automaticamente pelo i3status via ~/.config/i3status/config
# ══════════════════════════════════════════════════════════════════════════════

general {
    output_format  = "i3bar"
    colors         = false
    interval       = 3
    color_good     = "#9ece6a"
    color_degraded = "#e0af68"
    color_bad      = "#f7768e"
}

order += "cpu_usage"
order += "memory"
order += "disk /"
order += "ethernet _first_"
order += "wireless _first_"
order += "battery all"
order += "tztime local"

cpu_usage {
    format            = "󰻠 %usage"
    degraded_threshold = 85
    format_above_degraded_threshold = "󰻠 %usage"
}

memory {
    format             = "󰍛 %used/%total"
    threshold_degraded = "10%"
    format_degraded    = "󰍛 LOW"
}

disk "/" {
    format = "󰋊 %avail"
}

ethernet _first_ {
    format_up   = "󰈀 %ip"
    format_down = ""
}

wireless _first_ {
    format_up   = "󰖩 %essid"
    format_down = ""
}

battery all {
    format      = "󰁹 %percentage %remaining"
    format_down = ""
    last_full_capacity = true
    integer_battery_capacity = true
    status_chr = "󰂄"
    status_bat = "󰁹"
    status_unk = "󰂑"
    status_full = "󰁹"
    low_threshold = 15
    threshold_type = "percentage"
}

tztime local {
    format = "󰥔 %d/%m/%Y %H:%M"
}
