# ══════════════════════════════════════════════════════════════════════════════
# i3wm — Tokyo Night Day Theme (light)
# Gerenciado pelo dotfiles: dotfiles/i3/theme-light.conf
# ══════════════════════════════════════════════════════════════════════════════

# ── Font ───────────────────────────────────────────────────────────────────────
font pango:JetBrainsMono Nerd Font 10

# ── Borders ────────────────────────────────────────────────────────────────────
default_border pixel 2
default_floating_border pixel 2
hide_edge_borders smart

# ── Gaps (requer i3 ≥ 4.22) ───────────────────────────────────────────────────
gaps inner 8
gaps outer 4
smart_gaps on

# ── Tokyo Night Day — Paleta ───────────────────────────────────────────────────
# bg:       #e1e2e7   bg_alt:    #d5d6db   border_focus: #2e7de9
# fg:       #3760bf   fg_dim:    #848cb5
# blue:     #2e7de9   blue_dark: #a8aecb   cyan: #007197
# red:      #f52a65   green:     #587539   yellow: #8c6c3e

# ── Window Colors ──────────────────────────────────────────────────────────────
# class                 border    bg        text      indicator child_border
client.focused          #2e7de9   #a8aecb   #3760bf   #007197   #2e7de9
client.focused_inactive #d5d6db   #d5d6db   #848cb5   #d5d6db   #d5d6db
client.unfocused        #e1e2e7   #e1e2e7   #848cb5   #e1e2e7   #e1e2e7
client.urgent           #f52a65   #f52a65   #e1e2e7   #f52a65   #f52a65
client.placeholder      #e1e2e7   #e1e2e7   #3760bf   #e1e2e7   #e1e2e7
client.background       #e1e2e7

# ── Compositor ─────────────────────────────────────────────────────────────────
exec --no-startup-id picom --daemon
