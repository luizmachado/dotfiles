# ══════════════════════════════════════════════════════════════════════════════
# i3wm — Tokyo Night Theme
# Gerenciado pelo dotfiles: dotfiles/i3/theme.conf
# ══════════════════════════════════════════════════════════════════════════════

# ── Font ───────────────────────────────────────────────────────────────────────
font pango:JetBrainsMono Nerd Font 10

# ── Borders ────────────────────────────────────────────────────────────────────
default_border pixel 2
default_floating_border pixel 2
hide_edge_borders smart

# ── Gaps (requer i3 ≥ 4.22) ───────────────────────────────────────────────────
gaps inner 8
gaps outer 4
smart_gaps on

# ── Tokyo Night — Paleta ───────────────────────────────────────────────────────
# bg:       #1a1b26   bg_alt:    #24283b   border_focus: #7aa2f7
# fg:       #c0caf5   fg_dim:    #565f89
# blue:     #7aa2f7   blue_dark: #3d59a1   cyan: #7dcfff
# red:      #f7768e   green:     #9ece6a   yellow: #e0af68

# ── Window Colors ──────────────────────────────────────────────────────────────
# class                 border    bg        text      indicator child_border
client.focused          #7aa2f7   #3d59a1   #c0caf5   #7dcfff   #7aa2f7
client.focused_inactive #24283b   #24283b   #565f89   #24283b   #24283b
client.unfocused        #1a1b26   #1a1b26   #565f89   #1a1b26   #1a1b26
client.urgent           #f7768e   #f7768e   #1a1b26   #f7768e   #f7768e
client.placeholder      #1a1b26   #1a1b26   #c0caf5   #1a1b26   #1a1b26
client.background       #1a1b26

# ── Compositor ─────────────────────────────────────────────────────────────────
exec --no-startup-id picom --daemon
